<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>📐 数字全息 · 微小位移测量 | 微课随堂练</title>
  <!-- Font Awesome 图标库 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f5f7fc 0%, #e9eef4 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px 12px 40px;
    }

    .quiz-wrapper {
      max-width: 900px;
      width: 100%;
    }

    .header-card {
      background: #ffffffdd;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.9);
      border-radius: 32px;
      padding: 24px 24px 20px;
      margin-bottom: 20px;
      box-shadow: 0 12px 28px rgba(0, 20, 40, 0.08), 0 4px 12px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(110, 140, 200, 0.15);
    }

    .title-section {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      justify-content: space-between;
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 650;
      background: linear-gradient(135deg, #0b2b5e, #1a4a7a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #2c3e50;
      font-weight: 400;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .subtitle i {
      color: #2a6f97;
    }

    .formula-badge {
      background: #1a3e60;
      color: white;
      padding: 8px 18px;
      border-radius: 60px;
      font-size: 1.3rem;
      font-weight: 600;
      box-shadow: 0 6px 12px rgba(26, 62, 96, 0.15);
      display: inline-block;
      margin-top: 12px;
    }

    .formula-badge span {
      font-family: 'Courier New', monospace;
    }

    .key-info {
      display: flex;
      gap: 24px;
      margin-top: 14px;
      color: #1e3a5f;
      flex-wrap: wrap;
    }

    .key-info i {
      width: 24px;
      color: #2a6f97;
    }

    .score-panel {
      background: #1e3a5f;
      border-radius: 48px;
      padding: 10px 24px;
      color: white;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 6px 14px rgba(0,20,40,0.2);
      margin-top: 10px;
    }

    .score-text {
      font-size: 1.2rem;
      font-weight: 500;
    }

    .score-number {
      font-size: 2.6rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 2px;
    }

    .score-total {
      font-size: 1.2rem;
      opacity: 0.8;
    }

    .question-card {
      background: #fffffffa;
      backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 22px 24px;
      margin-bottom: 18px;
      box-shadow: 0 8px 20px rgba(0, 20, 40, 0.06);
      border: 1px solid #dbe4ed;
      transition: all 0.15s;
    }

    .question-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
    }

    .q-num {
      background: #d4e0f0;
      color: #0b2b5e;
      font-weight: 700;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .q-text {
      font-size: 1.2rem;
      font-weight: 550;
      line-height: 1.45;
      color: #13273e;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-left: 8px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #f9fbfd;
      padding: 10px 18px;
      border-radius: 20px;
      border: 1.5px solid #e2e9f2;
      transition: background 0.15s, border 0.15s;
      cursor: pointer;
    }

    .option:hover {
      background: #eaf0fa;
      border-color: #9bb7da;
    }

    .option input[type="radio"] {
      accent-color: #1a4a7a;
      width: 20px;
      height: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .option label {
      font-size: 1.05rem;
      font-weight: 480;
      color: #1e2f3f;
      width: 100%;
      cursor: pointer;
      line-height: 1.4;
    }

    .feedback-area {
      margin-top: 18px;
      padding: 8px 6px 0 48px;
      min-height: 38px;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .correct-feedback {
      color: #0f6e3f;
      font-weight: 500;
    }

    .wrong-feedback {
      color: #b13e3e;
      font-weight: 500;
    }

    .feedback-icon {
      font-size: 1.3rem;
    }

    .action-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 30px 0 20px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      background: white;
      padding: 16px 36px;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 600;
      box-shadow: 0 8px 18px rgba(0, 20, 40, 0.08);
      display: inline-flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: 0.18s;
      border: 1px solid #cddae9;
      color: #1e3a5f;
    }

    .btn-primary {
      background: #1a4a7a;
      border: 1px solid #1a4a7a;
      color: white;
      box-shadow: 0 12px 22px rgba(26, 74, 122, 0.25);
    }

    .btn-primary i {
      color: white;
    }

    .btn-primary:hover {
      background: #0e3a60;
      transform: translateY(-2px);
    }

    .btn-outline:hover {
      background: #e5ecf5;
      transform: translateY(-1px);
    }

    .footer-note {
      text-align: center;
      margin-top: 28px;
      color: #42668b;
      font-size: 0.95rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .footer-note i {
      opacity: 0.7;
    }

    .badge-light {
      background: #d9e4f0;
      padding: 6px 16px;
      border-radius: 30px;
    }

    @media (max-width: 550px) {
      h1 { font-size: 1.7rem; }
      .formula-badge { font-size: 1.1rem; }
      .q-text { font-size: 1.05rem; }
      .option { padding: 8px 12px; }
      .btn { padding: 14px 24px; font-size: 1rem; }
      .score-number { font-size: 2rem; }
    }
  </style>
</head>
<body>
<div class="quiz-wrapper">
  <div class="header-card">
    <div class="title-section">
      <h1>🔬 数字全息 · 微小位移</h1>
      <div class="subtitle">
        <i class="fas fa-video"></i> 微课随堂练习 · 巩固核心知识
      </div>
    </div>
    <div class="formula-badge">
      <span>Δx = Δp · k / λ</span>
    </div>
    <div class="key-info">
      <div><i class="fas fa-laser"></i> 氦氖激光器 · 632.8 nm</div>
      <div><i class="fas fa-camera"></i> 像元尺寸 k = 3.45 μm</div>
      <div><i class="fas fa-expand"></i> 透镜组: f₁=15mm, f₂=29mm</div>
    </div>
    <div class="score-panel">
      <div class="score-text"><i class="fas fa-star" style="margin-right: 6px;"></i>当前得分</div>
      <div><span class="score-number" id="scoreDisplay">0</span><span class="score-total"> / 100</span></div>
      <div style="margin-left: auto; font-size: 0.9rem; opacity: 0.9;">
        <i class="fas fa-check-circle"></i> 每题10分
      </div>
    </div>
  </div>

  <div id="questionsContainer"></div>

  <div class="action-bar">
    <button class="btn btn-primary" id="submitBtn"><i class="fas fa-paper-plane"></i> 提交答案 · 查看对错</button>
    <button class="btn btn-outline" id="resetBtn"><i class="fas fa-undo-alt"></i> 清空重做</button>
  </div>

  <div class="footer-note">
    <span><i class="far fa-lightbulb"></i> 基于微课视频内容 · 光路元件 · 操作步骤 · 公式应用</span>
    <span class="badge-light"><i class="fas fa-microchip"></i> MEMS · 生物医学 · 智能检测</span>
  </div>
  <div class="footer-note" style="margin-top: 8px; opacity: 0.8;">
    <i class="far fa-copy"></i> 数字全息测量 · 席语舟 项目
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- 题库数据 (基于微课台词设计) ----------
    const questions = [
      {
        text: "微课中使用的激光光源是什么类型？波长约为多少？",
        options: [
          "A. 半导体激光器 · 532 nm",
          "B. 氦氖激光器 · 632.8 nm",
          "C. 氩离子激光器 · 488 nm",
          "D. 固体激光器 · 1064 nm"
        ],
        answer: 1,
        explanation: "台词明确：632.8纳米波长的氦氖激光器，是能量之源。"
      },
      {
        text: "视频中将哪两个光学元件比喻为“光强调节师”？",
        options: [
          "A. 凸透镜与凹透镜",
          "B. 偏振片",
          "C. 可变光阑",
          "D. 分光棱镜"
        ],
        answer: 1,
        explanation: "两片偏振片被形容为“光强调节师”，通过旋转控制光强。"
      },
      {
        text: "扩束准直系统中两枚凸透镜的焦距分别是多少？",
        options: [
          "A. 10 mm 和 20 mm",
          "B. 15 mm 和 29 mm",
          "C. 20 mm 和 40 mm",
          "D. 25 mm 和 50 mm"
        ],
        answer: 1,
        explanation: "台词：由一枚15mm焦距和一枚29mm焦距的凸透镜组成。"
      },
      {
        text: "可变光阑在光路中起到的主要作用是什么？",
        options: [
          "A. 调节光束直径",
          "B. 截掉边缘杂散光，保证光斑纯净",
          "C. 改变光束偏振方向",
          "D. 聚焦光束到样品上"
        ],
        answer: 1,
        explanation: "台词：可变光阑是“光路清洁工”，截掉边缘杂散光。"
      },
      {
        text: "样品被固定在一个什么装置上，以保证横向平移？",
        options: [
          "A. 电动旋转台",
          "B. 高精度手动平移台",
          "C. 三维纳米定位台",
          "D. 压电陶瓷驱动器"
        ],
        answer: 1,
        explanation: "台词：样品被固定在一个高精度的手动平移台上。"
      },
      {
        text: "实验所用相机的像元物理尺寸 k 是多少？",
        options: [
          "A. 2.5 μm",
          "B. 3.45 μm",
          "C. 5.0 μm",
          "D. 1.0 μm"
        ],
        answer: 1,
        explanation: "台词：像元尺寸小至3.45微米。"
      },
      {
        text: "关于位移计算公式 Δx = Δp × k / λ，下列说法正确的是？",
        options: [
          "A. Δp 是样品实际移动距离，Δx 是像素移动数",
          "B. λ 代表系统放大率，通常约等于1",
          "C. k 是激光波长",
          "D. 该公式基于光的干涉原理"
        ],
        answer: 1,
        explanation: "Δx是实际位移，Δp是像素位移，λ为系统放大率。"
      },
      {
        text: "实验操作中，样品移动前拍摄的第一张图是什么？",
        options: [
          "A. 背景图（无样品）",
          "B. 样品在原点位置的全息图",
          "C. 参考光斑图",
          "D. 暗场噪声图"
        ],
        answer: 0,
        explanation: "台词第三步：在样品移动前，我们先拍摄一张背景图。"
      },
      {
        text: "视频中提到的实验第一步操作是什么？",
        options: [
          "A. 固定所有元件",
          "B. 调整光路，让两片透镜焦点重合",
          "C. 拍摄第一张全息图",
          "D. 操作平移台移动样品"
        ],
        answer: 1,
        explanation: "第一步：调整光路，让两片透镜的焦点重合，得到平行光。"
      },
      {
        text: "该测量技术最终将微小的实际位移转化为什么？",
        options: [
          "A. 电压变化量",
          "B. 图像上像素点的移动",
          "C. 光强度的变化",
          "D. 干涉条纹的间距"
        ],
        answer: 1,
        explanation: "台词：复杂的物理测量，最终转化为了我们在图像上数像素点的游戏。"
      }
    ];

    const container = document.getElementById('questionsContainer');
    const scoreDisplay = document.getElementById('scoreDisplay');
    let currentScore = 0;
    const questionCardRefs = [];

    function renderQuestions() {
      if (!container) return;
      let html = '';
      questions.forEach((q, index) => {
        html += `
          <div class="question-card" id="qCard${index}">
            <div class="question-header">
              <div class="q-num">${index + 1}</div>
              <div class="q-text">${q.text}</div>
            </div>
            <div class="options" id="optionsGroup${index}">
              ${q.options.map((opt, optIndex) => `
                <div class="option" data-q="${index}" data-opt="${optIndex}">
                  <input type="radio" name="q${index}" id="q${index}opt${optIndex}" value="${optIndex}">
                  <label for="q${index}opt${optIndex}">${opt}</label>
                </div>
              `).join('')}
            </div>
            <div class="feedback-area" id="feedback${index}"></div>
          </div>
        `;
      });
      container.innerHTML = html;

      document.querySelectorAll('.option').forEach(optDiv => {
        optDiv.addEventListener('click', function(e) {
          const radio = this.querySelector('input[type="radio"]');
          if (radio) radio.checked = true;
        });
      });

      for (let i = 0; i < questions.length; i++) {
        const feedbackEl = document.getElementById(`feedback${i}`);
        questionCardRefs[i] = {
          feedbackEl: feedbackEl,
          cardEl: document.getElementById(`qCard${i}`)
        };
      }
    }

    function evaluateAndDisplay() {
      let totalScore = 0;
      let allAnswered = true;
      const unansweredIndices = [];

      for (let i = 0; i < questions.length; i++) {
        const ref = questionCardRefs[i];
        if (ref && ref.feedbackEl) ref.feedbackEl.innerHTML = '';
        if (ref && ref.cardEl) ref.cardEl.style.border = '1px solid #dbe4ed';
      }

      for (let i = 0; i < questions.length; i++) {
        const radios = document.getElementsByName(`q${i}`);
        let selectedValue = null;
        for (let r of radios) if (r.checked) { selectedValue = r.value; break; }

        const qData = questions[i];
        const isCorrect = (selectedValue !== null && parseInt(selectedValue) === qData.answer);
        const feedbackEl = questionCardRefs[i].feedbackEl;
        const cardEl = questionCardRefs[i].cardEl;

        if (selectedValue === null) {
          allAnswered = false;
          unansweredIndices.push(i + 1);
          if (feedbackEl) {
            feedbackEl.innerHTML = `<span style="color:#b85b14;"><i class="fas fa-exclamation-circle"></i> 未作答，本题不计分</span>`;
          }
          if (cardEl) cardEl.style.border = '2px solid #f3b37f';
          continue;
        }

        if (isCorrect) totalScore += 10;

        const correctAnswerText = qData.options[qData.answer];
        const iconHtml = isCorrect ? 
          '<i class="fas fa-check-circle feedback-icon" style="color:#0f6e3f;"></i>' : 
          '<i class="fas fa-times-circle feedback-icon" style="color:#b13e3e;"></i>';
        
        const feedbackHtml = `
          <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
            ${iconHtml}
            <span class="${isCorrect ? 'correct-feedback' : 'wrong-feedback'}">
              ${isCorrect ? '✓ 回答正确！' : `✗ 回答错误。 正确答案是：${correctAnswerText}`}
            </span>
            <span style="font-size:0.9rem; color:#3a5f7a; margin-left: auto;">${qData.explanation}</span>
          </div>
        `;
        if (feedbackEl) feedbackEl.innerHTML = feedbackHtml;
        if (cardEl) cardEl.style.border = isCorrect ? '2px solid #9fc5e8' : '2px solid #e8b2b2';
      }

      currentScore = totalScore;
      scoreDisplay.textContent = currentScore;

      if (!allAnswered) {
        const existingToast = document.getElementById('toastMsg');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.id = 'toastMsg';
        toast.style.cssText = 'position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#1e3a5f; color:white; padding:12px 28px; border-radius:50px; box-shadow:0 10px 25px rgba(0,0,0,0.2); z-index:999; font-weight:500;';
        toast.innerHTML = `<i class="fas fa-info-circle"></i> 还有 ${unansweredIndices.length} 道题未作答，已答题得分 ${currentScore}/100`;
        document.body.appendChild(toast);
        setTimeout(() => { if(toast) toast.remove(); }, 3000);
      } else {
        if (currentScore === 100) {
          const toast = document.createElement('div');
          toast.style.cssText = 'position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#0f6e3f; color:white; padding:12px 28px; border-radius:50px; box-shadow:0 10px 25px rgba(0,0,0,0.2); z-index:999;';
          toast.innerHTML = `<i class="fas fa-trophy"></i> 太棒了！满分100！ 你对微课内容掌握得非常扎实！`;
          document.body.appendChild(toast);
          setTimeout(() => toast.remove(), 3500);
        }
      }
      return totalScore;
    }

    function resetAll() {
      for (let i = 0; i < questions.length; i++) {
        const radios = document.getElementsByName(`q${i}`);
        if (radios) radios.forEach(r => r.checked = false);
        const ref = questionCardRefs[i];
        if (ref && ref.feedbackEl) ref.feedbackEl.innerHTML = '';
        if (ref && ref.cardEl) ref.cardEl.style.border = '1px solid #dbe4ed';
      }
      currentScore = 0;
      scoreDisplay.textContent = '0';
      const toast = document.getElementById('toastMsg');
      if (toast) toast.remove();
    }

    function bindEvents() {
      const submitBtn = document.getElementById('submitBtn');
      const resetBtn = document.getElementById('resetBtn');
      submitBtn.addEventListener('click', evaluateAndDisplay);
      resetBtn.addEventListener('click', resetAll);
      container.addEventListener('change', function(e) {
        if (e.target && e.target.type === 'radio') {
          const name = e.target.name;
          const match = name.match(/q(\d+)/);
          if (match) {
            const idx = parseInt(match[1]);
            if (questionCardRefs[idx]) {
              const fb = questionCardRefs[idx].feedbackEl;
              if (fb) fb.innerHTML = '';
              const card = questionCardRefs[idx].cardEl;
              if (card) card.style.border = '1px solid #dbe4ed';
            }
          }
        }
      });
    }

    renderQuestions();
    bindEvents();
    scoreDisplay.textContent = '0';
  })();
</script>
</body>
</html>
