<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>📐 数字全息 · 微小位移测量 | 微课随堂练</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif; }
    body { background: linear-gradient(145deg, #f5f7fc 0%, #e9eef4 100%); min-height: 100vh; display: flex; justify-content: center; padding: 20px 12px 40px; }
    .quiz-wrapper { max-width: 900px; width: 100%; }
    .header-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 32px; padding: 24px 24px 20px; margin-bottom: 20px; box-shadow: 0 12px 28px rgba(0,20,40,0.08); border: 1px solid rgba(110,140,200,0.15); }
    .title-section { display: flex; align-items: baseline; flex-wrap: wrap; justify-content: space-between; }
    h1 { font-size: 1.9rem; font-weight: 650; background: linear-gradient(135deg, #0b2b5e, #1a4a7a); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .subtitle { color: #2c3e50; display: flex; align-items: center; gap: 8px; font-size: 1rem; }
    .formula-badge { background: #1a3e60; color: white; padding: 8px 18px; border-radius: 60px; font-size: 1.3rem; font-weight: 600; display: inline-block; margin-top: 12px; }
    .formula-badge span { font-family: 'Courier New', monospace; }
    .key-info { display: flex; gap: 24px; margin-top: 14px; color: #1e3a5f; flex-wrap: wrap; }
    .key-info i { width: 24px; color: #2a6f97; }
    .score-panel { background: #1e3a5f; border-radius: 48px; padding: 10px 24px; color: white; display: flex; align-items: center; gap: 16px; margin-top: 10px; box-shadow: 0 6px 14px rgba(0,20,40,0.2); }
    .score-text { font-size: 1.2rem; font-weight: 500; }
    .score-number { font-size: 2.6rem; font-weight: 800; line-height: 1; }
    .score-total { font-size: 1.2rem; opacity: 0.8; }
    .question-card { background: #fffffffa; border-radius: 28px; padding: 22px 24px; margin-bottom: 18px; box-shadow: 0 8px 20px rgba(0,20,40,0.06); border: 1px solid #dbe4ed; transition: all 0.15s; }
    .question-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 18px; }
    .q-num { background: #d4e0f0; color: #0b2b5e; font-weight: 700; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 14px; font-size: 1.2rem; flex-shrink: 0; }
    .q-text { font-size: 1.2rem; font-weight: 550; line-height: 1.45; color: #13273e; }
    .options { display: flex; flex-direction: column; gap: 12px; padding-left: 8px; }
    .option { display: flex; align-items: center; gap: 14px; background: #f9fbfd; padding: 12px 18px; border-radius: 20px; border: 1.5px solid #e2e9f2; transition: all 0.15s; cursor: pointer; }
    .option:hover { background: #eaf0fa; border-color: #9bb7da; }
    .option input[type="radio"] { accent-color: #1a4a7a; width: 20px; height: 20px; cursor: pointer; flex-shrink: 0; }
    .option label { font-size: 1.05rem; color: #1e2f3f; width: 100%; cursor: pointer; line-height: 1.4; }
    .feedback-area { margin-top: 18px; padding: 8px 6px 0 48px; min-height: 38px; font-size: 1rem; }
    .correct-feedback { color: #0f6e3f; font-weight: 500; }
    .wrong-feedback { color: #b13e3e; font-weight: 500; }
    .action-bar { display: flex; justify-content: center; gap: 20px; margin: 30px 0 20px; flex-wrap: wrap; }
    .btn { border: none; background: white; padding: 16px 36px; border-radius: 60px; font-size: 1.2rem; font-weight: 600; box-shadow: 0 8px 18px rgba(0,20,40,0.08); display: inline-flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.18s; border: 1px solid #cddae9; color: #1e3a5f; }
    .btn-primary { background: #1a4a7a; border: 1px solid #1a4a7a; color: white; box-shadow: 0 12px 22px rgba(26,74,122,0.25); }
    .btn-primary i { color: white; }
    .btn-primary:hover { background: #0e3a60; transform: translateY(-2px); }
    .btn-outline:hover { background: #e5ecf5; transform: translateY(-1px); }
    .footer-note { text-align: center; margin-top: 28px; color: #42668b; font-size: 0.95rem; display: flex; justify-content: center; align-items: center; gap: 18px; flex-wrap: wrap; }
    .badge-light { background: #d9e4f0; padding: 6px 16px; border-radius: 30px; }
    
    /* AI助手样式 */
    .ai-assistant { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
    .ai-toggle-btn { width: 60px; height: 60px; border-radius: 60px; background: #1a4a7a; border: none; box-shadow: 0 8px 24px rgba(26,74,122,0.35); color: white; font-size: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; border: 2px solid rgba(255,255,255,0.2); }
    .ai-toggle-btn:hover { background: #0e3a60; transform: scale(1.05); }
    .ai-chat-panel { position: absolute; bottom: 80px; right: 0; width: 400px; max-width: calc(100vw - 40px); background: white; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,20,40,0.2); overflow: hidden; display: none; flex-direction: column; border: 1px solid #dbe4ed; backdrop-filter: blur(8px); background: rgba(255,255,255,0.98); }
    .ai-chat-header { background: linear-gradient(135deg, #1a4a7a, #0e3a60); color: white; padding: 16px 18px; display: flex; align-items: center; gap: 12px; }
    .ai-chat-header i { font-size: 22px; }
    .ai-chat-header h3 { font-weight: 600; font-size: 1.2rem; margin: 0; }
    .ai-chat-messages { padding: 16px; min-height: 260px; max-height: 380px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #f9fbfd; }
    .message { display: flex; gap: 10px; align-items: flex-start; }
    .message.user { flex-direction: row-reverse; }
    .message-avatar { width: 32px; height: 32px; border-radius: 32px; background: #d4e0f0; display: flex; align-items: center; justify-content: center; color: #1e3a5f; font-weight: bold; flex-shrink: 0; }
    .message.user .message-avatar { background: #1a4a7a; color: white; }
    .message-bubble { background: white; padding: 12px 16px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid #e2e9f2; font-size: 0.95rem; line-height: 1.5; color: #13273e; max-width: 85%; }
    .message.user .message-bubble { background: #eaf0fa; border-color: #b8cee8; }
    .quick-questions { padding: 12px 16px 8px; display: flex; flex-wrap: wrap; gap: 8px; border-top: 1px solid #e2e9f2; }
    .quick-btn { background: white; border: 1px solid #cddae9; border-radius: 30px; padding: 6px 14px; font-size: 0.8rem; color: #1e3a5f; cursor: pointer; transition: 0.1s; font-weight: 500; }
    .quick-btn:hover { background: #1a4a7a; color: white; border-color: #1a4a7a; }
    .ai-input-area { display: flex; padding: 12px 16px 16px; gap: 8px; border-top: 1px solid #e2e9f2; }
    .ai-input-area input { flex: 1; border: 1.5px solid #dbe4ed; border-radius: 40px; padding: 12px 16px; font-size: 0.95rem; outline: none; background: white; }
    .ai-input-area input:focus { border-color: #1a4a7a; }
    .ai-input-area button { background: #1a4a7a; border: none; width: 48px; height: 48px; border-radius: 48px; color: white; font-size: 18px; cursor: pointer; }
    
    @media (max-width: 550px) {
      h1 { font-size: 1.5rem; }
      .formula-badge { font-size: 1rem; }
      .q-text { font-size: 1rem; }
      .btn { padding: 12px 20px; font-size: 1rem; }
      .ai-chat-panel { width: 320px; }
    }
  </style>
</head>
<body>
<div class="quiz-wrapper">
  <div class="header-card">
    <div class="title-section">
      <h1>🔬 数字全息·微小位移测量</h1>
      <div class="subtitle">
        <i class="fas fa-video"></i> 微课随堂练习 · 智能答疑
      </div>
    </div>
    <div class="formula-badge">
      <span>Δx = Δp · k / M</span>
    </div>
    <div class="key-info">
      <div><i class="fas fa-laser"></i> 632.8nm 氦氖激光器</div>
      <div><i class="fas fa-camera"></i> k = 3.45 μm</div>
      <div><i class="fas fa-expand"></i> M ≈ 1</div>
    </div>
    <div class="score-panel">
      <div class="score-text"><i class="fas fa-star" style="margin-right: 6px;"></i>当前得分</div>
      <div><span class="score-number" id="scoreDisplay">0</span><span class="score-total"> / 100</span></div>
      <div style="margin-left: auto; font-size: 0.9rem; opacity: 0.9;">
        <i class="fas fa-check-circle"></i> 每题10分
      </div>
    </div>
  </div>

  <div id="questionsContainer"></div>

  <div class="action-bar">
    <button class="btn btn-primary" id="submitBtn"><i class="fas fa-paper-plane"></i> 提交答案 · 查看得分</button>
    <button class="btn btn-outline" id="resetBtn"><i class="fas fa-undo-alt"></i> 清空重做</button>
  </div>

  <div class="footer-note">
    <span><i class="far fa-lightbulb"></i> 量程0.15~1.05mm · 扩展不确定度±0.015mm(k=2) · 平均相对误差0.22%</span>
    <span class="badge-light"><i class="fas fa-microchip"></i> MEMS · 生物医学 · 精密制造</span>
  </div>
</div>

<!-- AI学习助手 -->
<div class="ai-assistant">
  <button class="ai-toggle-btn" id="aiToggleBtn" title="AI学习助手 · 随时为你答疑">
    <i class="fas fa-robot"></i>
  </button>
  <div class="ai-chat-panel" id="aiChatPanel">
    <div class="ai-chat-header">
      <i class="fas fa-graduation-cap"></i>
      <h3>全息·学习助手 ✨</h3>
      <small style="margin-left: auto; opacity: 0.9;">随时在线</small>
    </div>
    <div class="ai-chat-messages" id="chatMessages">
      <div class="message">
        <div class="message-avatar"><i class="fas fa-robot"></i></div>
        <div class="message-bubble">
          嗨！👋 我是你的专属学习助手～<br>
          关于数字全息测位移的任何问题都可以问我！<br>
          试试点击下面的快捷问题，或者直接输入你的疑问吧！
        </div>
      </div>
    </div>
    <div class="quick-questions">
      <span class="quick-btn" data-question="Δx=Δp×k/M 公式怎么理解？">📐 公式详解</span>
      <span class="quick-btn" data-question="实验光路中有哪些元件？">🔭 光路元件</span>
      <span class="quick-btn" data-question="主要误差来源有哪些？">⚠️ 误差分析</span>
      <span class="quick-btn" data-question="数字全息有什么优势？">✨ 技术优势</span>
      <span class="quick-btn" data-question="这个技术能用在哪些领域？">🎯 应用领域</span>
    </div>
    <div class="ai-input-area">
      <input type="text" id="aiQuestionInput" placeholder="输入你的问题…" />
      <button id="aiSendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- 题库数据 ----------
    const questions = [
      { text: "微课中使用的激光光源是什么类型？波长约为多少？", options: ["A. 半导体激光器 · 532 nm", "B. 氦氖激光器 · 632.8 nm", "C. 氩离子激光器 · 488 nm", "D. 固体激光器 · 1064 nm"], answer: 1, explanation: "台词明确：632.8纳米波长的氦氖激光器，是能量之源。" },
      { text: "视频中将哪两个光学元件比喻为“光强调节师”？", options: ["A. 凸透镜与凹透镜", "B. 偏振片", "C. 可变光阑", "D. 分光棱镜"], answer: 1, explanation: "两片偏振片被形容为“光强调节师”，通过旋转控制光强。" },
      { text: "扩束准直系统中两枚凸透镜的焦距分别是多少？", options: ["A. 10 mm 和 20 mm", "B. 15 mm 和 29 mm", "C. 20 mm 和 40 mm", "D. 25 mm 和 50 mm"], answer: 1, explanation: "台词：由一枚15mm焦距和一枚29mm焦距的凸透镜组成。" },
      { text: "可变光阑在光路中起到的主要作用是什么？", options: ["A. 调节光束直径", "B. 截掉边缘杂散光，保证光斑纯净", "C. 改变光束偏振方向", "D. 聚焦光束到样品上"], answer: 1, explanation: "台词：可变光阑是“光路清洁工”，截掉边缘杂散光。" },
      { text: "样品被固定在一个什么装置上，以保证横向平移？", options: ["A. 电动旋转台", "B. 高精度手动平移台", "C. 三维纳米定位台", "D. 压电陶瓷驱动器"], answer: 1, explanation: "台词：样品被固定在一个高精度的手动平移台上。" },
      { text: "实验所用相机的像元物理尺寸 k 是多少？", options: ["A. 2.5 μm", "B. 3.45 μm", "C. 5.0 μm", "D. 1.0 μm"], answer: 1, explanation: "台词：像元尺寸小至3.45微米。" },
      { text: "关于位移计算公式 Δx = Δp × k / M，下列说法正确的是？", options: ["A. Δp 是样品实际移动距离", "B. M 代表系统放大率，通常约等于1", "C. k 是激光波长", "D. 该公式基于光的干涉原理"], answer: 1, explanation: "Δx实际位移，Δp像素位移，M为系统放大率≈1。" },
      { text: "实验操作中，样品移动前拍摄的第一张图是什么？", options: ["A. 背景图", "B. 样品在原点位置的全息图", "C. 参考光斑图", "D. 暗场噪声图"], answer: 0, explanation: "第三步：在样品移动前，我们先拍摄一张背景图。" },
      { text: "视频中提到的实验第一步操作是什么？", options: ["A. 固定所有元件", "B. 调整光路，让两片透镜焦点重合", "C. 拍摄第一张全息图", "D. 操作平移台移动样品"], answer: 1, explanation: "第一步：调整光路，让两片透镜的焦点重合，得到平行光。" },
      { text: "该测量技术最终将微小的实际位移转化为什么？", options: ["A. 电压变化量", "B. 图像上像素点的移动", "C. 光强度的变化", "D. 干涉条纹的间距"], answer: 1, explanation: "台词：复杂的物理测量，最终转化为了我们在图像上数像素点的游戏！" }
    ];

    const container = document.getElementById('questionsContainer');
    const scoreDisplay = document.getElementById('scoreDisplay');
    let currentScore = 0;
    const questionCardRefs = [];

    // 渲染题目
    function renderQuestions() {
      if (!container) return;
      let html = '';
      questions.forEach((q, index) => {
        html += `
          <div class="question-card" id="qCard${index}">
            <div class="question-header">
              <div class="q-num">${index + 1}</div>
              <div class="q-text">${q.text}</div>
            </div>
            <div class="options">
              ${q.options.map((opt, optIndex) => `
                <div class="option" data-q="${index}" data-opt="${optIndex}">
                  <input type="radio" name="q${index}" id="q${index}opt${optIndex}" value="${optIndex}">
                  <label for="q${index}opt${optIndex}">${opt}</label>
                </div>
              `).join('')}
            </div>
            <div class="feedback-area" id="feedback${index}"></div>
          </div>
        `;
      });
      container.innerHTML = html;

      // 绑定点击事件：点击整个option区域都能选中radio
      document.querySelectorAll('.option').forEach(optDiv => {
        optDiv.addEventListener('click', function(e) {
          const radio = this.querySelector('input[type="radio"]');
          if (radio) {
            radio.checked = true;
            // 触发change事件以便清除旧反馈
            radio.dispatchEvent(new Event('change', { bubbles: true }));
          }
        });
      });

      for (let i = 0; i < questions.length; i++) {
        questionCardRefs[i] = {
          feedbackEl: document.getElementById(`feedback${i}`),
          cardEl: document.getElementById(`qCard${i}`)
        };
      }
    }

    // 显示得分提示
    function showScoreToast(message, isSuccess = true) {
      const existingToast = document.getElementById('scoreToast');
      if (existingToast) existingToast.remove();
      const toast = document.createElement('div');
      toast.id = 'scoreToast';
      toast.style.cssText = `position:fixed; top:20px; left:50%; transform:translateX(-50%); background:${isSuccess ? '#0f6e3f' : '#1e3a5f'}; color:white; padding:14px 32px; border-radius:50px; box-shadow:0 10px 30px rgba(0,0,0,0.2); z-index:9999; font-weight:500; font-size:1.1rem;`;
      toast.innerHTML = `<i class="fas fa-${isSuccess ? 'trophy' : 'info-circle'}"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => { if(toast) toast.remove(); }, 3500);
    }

    function evaluateAndDisplay() {
      let totalScore = 0;
      let answeredCount = 0;

      for (let i = 0; i < questions.length; i++) {
        const ref = questionCardRefs[i];
        if (ref && ref.feedbackEl) ref.feedbackEl.innerHTML = '';
        if (ref && ref.cardEl) ref.cardEl.style.border = '1px solid #dbe4ed';
      }

      for (let i = 0; i < questions.length; i++) {
        const radios = document.getElementsByName(`q${i}`);
        let selectedValue = null;
        for (let r of radios) if (r.checked) { selectedValue = r.value; break; }

        const qData = questions[i];
        const isCorrect = (selectedValue !== null && parseInt(selectedValue) === qData.answer);
        const feedbackEl = questionCardRefs[i].feedbackEl;
        const cardEl = questionCardRefs[i].cardEl;

        if (selectedValue !== null) answeredCount++;

        if (selectedValue === null) {
          if (feedbackEl) {
            feedbackEl.innerHTML = `<span style="color:#b85b14;"><i class="fas fa-exclamation-circle"></i> 未作答，本题不计分</span>`;
          }
          if (cardEl) cardEl.style.border = '2px solid #f3b37f';
          continue;
        }

        if (isCorrect) totalScore += 10;

        const correctAnswerText = qData.options[qData.answer];
        const iconHtml = isCorrect ? 
          '<i class="fas fa-check-circle" style="color:#0f6e3f; font-size:1.3rem;"></i>' : 
          '<i class="fas fa-times-circle" style="color:#b13e3e; font-size:1.3rem;"></i>';
        
        const feedbackHtml = `
          <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
            ${iconHtml}
            <span class="${isCorrect ? 'correct-feedback' : 'wrong-feedback'}">
              ${isCorrect ? '✓ 回答正确！' : `✗ 回答错误。 正确答案是：${correctAnswerText}`}
            </span>
            <span style="font-size:0.9rem; color:#3a5f7a; margin-left: auto;">${qData.explanation}</span>
          </div>
        `;
        if (feedbackEl) feedbackEl.innerHTML = feedbackHtml;
        if (cardEl) cardEl.style.border = isCorrect ? '2px solid #9fc5e8' : '2px solid #e8b2b2';
      }

      currentScore = totalScore;
      scoreDisplay.textContent = currentScore;

      // 显示得分提示
      if (answeredCount === 0) {
        showScoreToast('还没有作答任何题目哦，试试看！', false);
      } else if (answeredCount < questions.length) {
        showScoreToast(`已完成 ${answeredCount} 题，当前得分 ${currentScore}/100，继续加油！ 💪`, false);
      } else {
        if (currentScore === 100) {
          showScoreToast(`🎉 太棒了！满分100分！你对数字全息测量掌握得非常扎实！`, true);
        } else if (currentScore >= 80) {
          showScoreToast(`👍 不错哦！得分 ${currentScore}/100，再复习一下错题会更棒！`, true);
        } else {
          showScoreToast(`📚 得分 ${currentScore}/100，建议再看看微课回顾一下知识点～`, false);
        }
      }
    }

    function resetAll() {
      for (let i = 0; i < questions.length; i++) {
        const radios = document.getElementsByName(`q${i}`);
        if (radios) radios.forEach(r => r.checked = false);
        const ref = questionCardRefs[i];
        if (ref && ref.feedbackEl) ref.feedbackEl.innerHTML = '';
        if (ref && ref.cardEl) ref.cardEl.style.border = '1px solid #dbe4ed';
      }
      currentScore = 0;
      scoreDisplay.textContent = '0';
      const toast = document.getElementById('scoreToast');
      if (toast) toast.remove();
    }

    // ---------- AI助手（热情版，豆包风格）----------
    const knowledge = {
      intro: "本实验基于数字全息/数字图像相关法，测量微小位移。核心公式 Δx = Δp × k / M。Δx实际位移，Δp像素位移，k=3.45μm，M≈1。",
      setup: "装置从左到右：632.8nm氦氖激光器 → 偏振片 → f=15mm透镜 → f=29mm透镜 → 可变光阑 → 样品(手动平移台) → 面扫描相机(3.45μm像元)。",
      steps: "步骤：1.搭建平行光路(透镜焦点重合)；2.拍背景图；3.拍初始图；4.平移样品；5.拍位移后图；6.计算像素位移Δp；7.代入公式得Δx。",
      conclusions: "关键结论：放大率准确性决定精度；样品表面质量影响大；平均相对误差0.22%；量程0.15–1.05mm；扩展不确定度±0.015mm(k=2)。",
      errors: "主要误差：机械回程差、环境振动、温度漂移、放大率标定不准、杂散光干扰。",
      advantages: "创新优势：非接触全场测量；抗电磁干扰；不受离面位移/离焦影响；一次成像速度快。",
      applications: "典型应用：MEMS微器件检测、纳米材料形变、生物细胞运动、精密制造、芯片、航空航天。"
    };

    function generateAnswer(question) {
      const q = question.toLowerCase();
      let answer = "";
      
      if (q.includes("公式") || q.includes("Δx") || q.includes("计算")) {
        answer = `📐 核心公式是 Δx = Δp × k / M。其中Δx是实际位移，Δp是图像上看到的像素位移，k=3.45μm是像元尺寸，M≈1是系统放大率。简单说就是把像素移动数乘以3.45微米，就能得到真实移动距离啦！`;
      } else if (q.includes("装置") || q.includes("光路") || q.includes("元件") || q.includes("透镜")) {
        answer = `🔭 实验光路从左到右依次是：632.8nm氦氖激光器 → 偏振片 → 15mm凸透镜 → 29mm凸透镜 → 可变光阑 → 样品（固定在高精度手动平移台上）→ 面扫描相机。两片透镜组成扩束准直系统，焦点重合后产生平行光。`;
      } else if (q.includes("步骤") || q.includes("操作") || q.includes("流程")) {
        answer = `⚙️ 实验步骤：第一步调整光路让两透镜焦点重合获得平行光；第二步拍背景图；第三步拍初始图；第四步平移样品；第五步拍位移后图；第六步计算像素位移Δp；第七步代入公式得到实际位移Δx。`;
      } else if (q.includes("误差") || q.includes("不确定") || q.includes("精度")) {
        answer = `⚠️ 主要误差来源包括：机械回程差、环境振动、温度漂移、放大率标定不准、杂散光干扰。系统的扩展不确定度为±0.015mm(k=2)，平均相对误差仅0.22%，精度还是很高的！`;
      } else if (q.includes("优势") || q.includes("优点") || q.includes("创新")) {
        answer = `✨ 数字全息技术有很多优势：非接触测量不损伤样品；全场测量一次获得整个视场信息；抗电磁干扰适合复杂环境；不受离面位移影响避免离焦误差。而且纯光学方法，速度快！`;
      } else if (q.includes("应用") || q.includes("用途") || q.includes("领域")) {
        answer = `🎯 应用非常广泛！包括MEMS微器件检测（微陀螺仪、微执行器）、纳米材料形变分析（热膨胀、应力）、生物医学（细胞运动观测）、精密制造、芯片检测、航空航天等。真正用光学丈量微观世界！`;
      } else if (q.includes("量程") || q.includes("范围")) {
        answer = `📏 本系统的有效量程是0.15mm到1.05mm，在这个范围内测量结果可靠。`;
      } else if (q.includes("波长") || q.includes("激光")) {
        answer = `🔴 使用的是632.8nm波长的氦氖激光器，发出纯净的红光，相干性好，是测量的理想光源。`;
      } else {
        answer = `😊 我主要可以回答关于公式、光路装置、实验步骤、误差分析、技术优势和应用领域的问题。你可以试试问我“公式怎么理解”或者“有哪些误差来源”～ 当然，我也知道一些基础知识：${knowledge.intro}`;
      }
      
      // 豆包风格：加上热情结尾和追问
      const followUps = [
        "还有什么想了解的吗？我可以继续给你讲哦～",
        "需要我再详细解释某个部分吗？",
        "如果还有不清楚的地方，随时问我！",
        "要不要我再给你总结一下重点？",
        "学累了吗？有问题尽管问，我一直在～"
      ];
      const randomFollow = followUps[Math.floor(Math.random() * followUps.length)];
      answer += `<br><br>💬 ${randomFollow}`;
      
      return answer;
    }

    // 聊天功能
    const toggleBtn = document.getElementById('aiToggleBtn');
    const panel = document.getElementById('aiChatPanel');
    const chatMessages = document.getElementById('chatMessages');
    const questionInput = document.getElementById('aiQuestionInput');
    const sendBtn = document.getElementById('aiSendBtn');

    function addMessage(text, isUser = false) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${isUser ? 'user' : ''}`;
      msgDiv.innerHTML = `
        <div class="message-avatar">${isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>'}</div>
        <div class="message-bubble">${text}</div>
      `;
      chatMessages.appendChild(msgDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function handleUserQuestion(questionText) {
      if (!questionText.trim()) return;
      addMessage(questionText, true);
      setTimeout(() => {
        const answer = generateAnswer(questionText);
        addMessage(answer, false);
      }, 400);
      questionInput.value = '';
    }

    // 事件绑定
    renderQuestions();
    
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    submitBtn.addEventListener('click', evaluateAndDisplay);
    resetBtn.addEventListener('click', resetAll);
    
    toggleBtn.addEventListener('click', () => { 
      panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex'; 
    });
    
    sendBtn.addEventListener('click', () => handleUserQuestion(questionInput.value));
    questionInput.addEventListener('keypress', (e) => { 
      if (e.key === 'Enter') handleUserQuestion(questionInput.value); 
    });
    
    document.querySelectorAll('.quick-btn').forEach(btn => { 
      btn.addEventListener('click', () => handleUserQuestion(btn.dataset.question)); 
    });

    container.addEventListener('change', function(e) {
      if (e.target && e.target.type === 'radio') {
        const name = e.target.name;
        const match = name.match(/q(\d+)/);
        if (match) {
          const idx = parseInt(match[1]);
          if (questionCardRefs[idx]) {
            const fb = questionCardRefs[idx].feedbackEl;
            if (fb) fb.innerHTML = '';
            const card = questionCardRefs[idx].cardEl;
            if (card) card.style.border = '1px solid #dbe4ed';
          }
        }
      }
    });

    scoreDisplay.textContent = '0';
  })();
</script>
</body>
</html>
